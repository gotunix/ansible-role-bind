---
# configure bind9 — named.conf.local and zone files

- name: Ensure zones directory exists
  ansible.builtin.file:
    path: /etc/bind/zones
    state: directory
    owner: root
    group: bind
    mode: "0755"

- name: Write named.conf.local
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: bind
    mode: "0644"
  notify: Restart bind9

- name: Deploy zone files
  ansible.builtin.template:
    src: zonefile.j2
    dest: "{{ item.file }}"
    owner: root
    group: bind
    mode: "0644"
  loop: "{{ bind9_zones }}"
  when: bind9_zones | length > 0
  notify: Restart bind9

- name: Ensure bind9 service is running
  ansible.builtin.service:
    name: bind9
    state: started
    enabled: true
