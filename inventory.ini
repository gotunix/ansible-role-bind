# Example inventory for user/group management
#
# The Ansible group names here are what the role uses to decide
# which users/groups to apply on each host.

[webservers]
# web1 ansible_host=192.168.1.10 ansible_user=root
# web2 ansible_host=192.168.1.11 ansible_user=root

[dbservers]
# db-primary ansible_host=192.168.1.20 ansible_user=root
# db-replica ansible_host=192.168.1.21 ansible_user=root

[devboxes]
# dev1 ansible_host=192.168.1.30 ansible_user=root
